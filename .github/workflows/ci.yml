name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same ref so PRs don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — pytest + ruff (Python ${{ matrix.python-version }})
    # Linux only: macOS/Windows runners incur billed minutes (billing constraint).
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — SHA-pinned to avoid floating tag abuse.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test/lint deps
        working-directory: backend
        run: pip install -e ".[test,lint]"

      - name: Ruff — lint
        working-directory: backend
        run: python -m ruff check src/ tests/

      - name: Ruff — format check
        working-directory: backend
        run: python -m ruff format --check src/ tests/

      - name: Pytest
        working-directory: backend
        run: python -m pytest --tb=short -q

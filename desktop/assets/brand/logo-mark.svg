<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c40b0"/>
      <stop offset="50%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Compact spectrum bars -->
  <g filter="url(#gl)">
    <rect x="4"  y="36" width="6" height="20" rx="2" fill="url(#g)" opacity="0.5"/>
    <rect x="12" y="28" width="6" height="28" rx="2" fill="url(#g)" opacity="0.7"/>
    <rect x="20" y="18" width="6" height="38" rx="2" fill="url(#g)" opacity="0.85"/>
    <rect x="28" y="10" width="6" height="46" rx="2" fill="url(#g)"/>
    <rect x="36" y="14" width="6" height="42" rx="2" fill="url(#g)" opacity="0.9"/>
    <rect x="44" y="24" width="6" height="32" rx="2" fill="url(#g)" opacity="0.7"/>
    <rect x="52" y="34" width="6" height="22" rx="2" fill="url(#g)" opacity="0.5"/>
  </g>
  <!-- Dots at bar tops -->
  <g fill="#c084fc">
    <circle cx="7"  cy="34" r="2"/>
    <circle cx="15" cy="26" r="2"/>
    <circle cx="23" cy="16" r="2"/>
    <circle cx="31" cy="8"  r="3"/>
    <circle cx="39" cy="12" r="2"/>
    <circle cx="47" cy="22" r="2"/>
    <circle cx="55" cy="32" r="2"/>
  </g>
</svg>

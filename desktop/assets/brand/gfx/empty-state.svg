<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1430" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d0d10" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c40b0"/>
      <stop offset="50%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Subtle bg rect -->
  <rect width="320" height="200" rx="12" fill="url(#bg)"/>

  <!-- Concentric rings (disco-ball / waveform origin) -->
  <circle cx="160" cy="90" r="70" fill="none" stroke="#7c6af7" stroke-width="1" opacity="0.08"/>
  <circle cx="160" cy="90" r="52" fill="none" stroke="#7c6af7" stroke-width="1" opacity="0.12"/>
  <circle cx="160" cy="90" r="34" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.18"/>
  <circle cx="160" cy="90" r="16" fill="none" stroke="#7c6af7" stroke-width="2" opacity="0.25"/>

  <!-- Center spectrum bars (idle, low height) -->
  <g filter="url(#gl)" opacity="0.6">
    <rect x="122" y="80" width="8" height="20" rx="2" fill="url(#sg)"/>
    <rect x="134" y="72" width="8" height="28" rx="2" fill="url(#sg)"/>
    <rect x="146" y="66" width="8" height="34" rx="2" fill="url(#sg)"/>
    <rect x="158" y="62" width="8" height="38" rx="2" fill="url(#sg)"/>
    <rect x="170" y="66" width="8" height="34" rx="2" fill="url(#sg)"/>
    <rect x="182" y="72" width="8" height="28" rx="2" fill="url(#sg)"/>
    <rect x="194" y="80" width="8" height="20" rx="2" fill="url(#sg)"/>
  </g>

  <!-- Baseline glow -->
  <line x1="110" y1="100" x2="210" y2="100" stroke="url(#sg)" stroke-width="1.5" opacity="0.3"/>

  <!-- Floating dots -->
  <circle cx="60" cy="50" r="3" fill="#c084fc" opacity="0.3"/>
  <circle cx="80" cy="130" r="2" fill="#7c6af7" opacity="0.25"/>
  <circle cx="250" cy="40" r="2.5" fill="#f472b6" opacity="0.2"/>
  <circle cx="270" cy="140" r="3" fill="#7c6af7" opacity="0.25"/>
  <circle cx="40" cy="100" r="2" fill="#c084fc" opacity="0.2"/>
  <circle cx="290" cy="90" r="2" fill="#f472b6" opacity="0.18"/>
</svg>

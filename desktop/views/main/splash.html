<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelosViz — Loading</title>
  <style>
    :root {
      --mv-bg-base:        #0d0d10;
      --mv-accent:         #7c6af7;
      --mv-accent-hi:      #a78bfa;
      --mv-text-hi:        #f0f0f8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--mv-bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      text-align: center;
    }

    .splash-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .splash-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #4c40b0 0%, #7c6af7 50%, #c084fc 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 0 48px rgba(124, 106, 247, 0.25);
    }

    .splash-wordmark {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #4c40b0 0%, #7c6af7 50%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .splash-tagline {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9090b0;
      margin-top: -8px;
    }

    .splash-loader {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
    }

    .loader-bar {
      width: 7px;
      border-radius: 3px;
      background: var(--mv-accent);
      animation: barDance 0.8s ease-in-out infinite alternate;
    }

    .loader-bar:nth-child(1) { animation-delay: 0.00s; }
    .loader-bar:nth-child(2) { animation-delay: 0.10s; }
    .loader-bar:nth-child(3) { animation-delay: 0.20s; }
    .loader-bar:nth-child(4) { animation-delay: 0.30s; }
    .loader-bar:nth-child(5) { animation-delay: 0.40s; }
    .loader-bar:nth-child(6) { animation-delay: 0.50s; }
    .loader-bar:nth-child(7) { animation-delay: 0.60s; }

    @keyframes barDance {
      from { height: 6px;  opacity: 0.4; }
      to   { height: 36px; opacity: 1;   }
    }

    .splash-text {
      font-size: 14px;
      color: #9090b0;
      opacity: 0.8;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100%   { opacity: 0.6; }
      50%        { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-logo">
      <div class="splash-icon">♪</div>
      <div class="splash-wordmark">MelosViz</div>
      <div class="splash-tagline">Festival Visualizer</div>
    </div>

    <div class="splash-loader">
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
    </div>

    <div class="splash-text">Initializing…</div>
  </div>
</body>
</html>

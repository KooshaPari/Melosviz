# qgate configuration for MelosViz
# Granular-recursive quality gate — 85% per module, recursively.
# "1 via 2": gate stands RED first (tight grip), then backfill toward green.
#
# Reusable workflow:
#   uses: KooshaPari/phenotype-tooling/.github/workflows/reusable/quality-gate.yml@main

[coverage]
# Threshold applied to every module recursively — no module hides behind the average.
threshold = 85
path = "backend/coverage/lcov.info"
format = "lcov"

[checks]
# Check categories and their N/A justifications.
# All categories default to required unless explicitly marked not-applicable.

# unit: pytest, all in tests/ directory
# integration: tests that span multiple modules (subset of pytest suite)
# e2e: test_e2e_pipeline_smoke.py (synthetic WAV → full pipeline)
# chaos: test_qgate_backfill.py::TestChaosResilience (failure injection)
# perf: test_qgate_backfill.py::TestPerfSmoke (<15s init, <5s edit budgets)
# property: test_qgate_backfill.py::TestPropertyPresets (hypothesis)
# mutation: mutmut config below — slow; run separately
# static: ruff + mypy (run in CI backend job)
# security: bandit SAST (run in CI backend job)

# a11y: Webview UI is WKWebView via Electrobun — no headless Chromium in CI.
#   The webview frontend is tested manually on host. Not feasible in Linux CI.
not_applicable = ["a11y"]

[mutation]
# mutmut — configured but slow; run locally or nightly
# run: mutmut run --paths-to-mutate backend/src/melosviz/ --tests-dir backend/tests/
# target: ≥75% mutation score (per qgate bar)
target_score = 75

[security]
# bandit SAST: run in CI with -lll -iii (high/critical only = exit 1)
# gitleaks: secret scanning via pre-commit / CI scorecard
sast_tool = "bandit"
min_severity = "high"  # medium issues: warn-only

[perf]
# Budget targets from docs/PERF_BENCHMARK.md and ADR 0003:
#   analysis init (spec_from_wav, dep-light): <15s
#   edit/scrub (segment re-render): <5s
#   realtime (wgpu renderer): ~8ms/frame
init_budget_ms = 15000
edit_budget_ms = 5000
